{{- /* {{< gallery >}} — renders the images bundled with this note as a lightbox grid. */ -}}
{{- $images := .Page.Resources.ByType "image" -}}
{{- with $images }}
<section class="gallery">
  {{- range . }}
  {{- $t := partial "thumb.html" . }}
  <figure>
    <a class="lightbox" href="{{ .RelPermalink }}" data-caption="{{ .Params.alt }}">
      <img src="{{ $t.RelPermalink }}" width="{{ $t.Width }}" height="{{ $t.Height }}" alt="{{ .Params.alt }}" loading="lazy" decoding="async">
    </a>
  </figure>
  {{- end }}
</section>
{{- end -}}
